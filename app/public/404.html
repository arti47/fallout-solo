<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fallout: Wasteland Wanderer</title>
    <!--
      GitHub Pages SPA fallback.
      Pages serves this file for any unknown path, so we encode the requested
      route into a query string and redirect to the app root, where the restore
      script in index.html rebuilds the original URL for React Router.
      pathSegmentsToKeep = 1 keeps the "/fallout-solo" project base path.
    -->
    <script type="text/javascript">
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
